<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="underlineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <!-- White Background -->
  <rect x="0" y="0" width="500" height="500" fill="#FFFFFF"/>

  <!-- Logo Group - Centered -->
  <g transform="translate(108, 216)">
    <!-- Icon Mark (68×68) -->
    <g>
      <rect x="0" y="0" width="68" height="68" rx="14" ry="14" fill="url(#logoGrad)"/>
      <!-- Pen nib -->
      <polygon points="24,14 32,38 24,56 16,38" fill="#FFFFFF"/>
      <!-- Ink dot at tip -->
      <circle cx="24" cy="53" r="2.5" fill="#FFFFFF"/>
      <!-- Bio text lines -->
      <line x1="38" y1="20" x2="56" y2="20" stroke="#FFFFFF" stroke-opacity="0.65" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="38" y1="28" x2="54" y2="28" stroke="#FFFFFF" stroke-opacity="0.55" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="38" y1="36" x2="52" y2="36" stroke="#FFFFFF" stroke-opacity="0.50" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="38" y1="44" x2="50" y2="44" stroke="#FFFFFF" stroke-opacity="0.45" stroke-width="2.5" stroke-linecap="round"/>
    </g>

    <!-- Wordmark (16px gap from icon) -->
    <g transform="translate(84, 0)">
      <text x="0" y="30" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="24" fill="#0F172A" letter-spacing="0.3">Profile Bio</text>
      <text x="0" y="52" font-family="Georgia, 'Times New Roman', serif" font-weight="400" font-size="18" fill="#64748B" letter-spacing="0.2">Generator</text>
      <rect x="0" y="56" width="52" height="2.5" rx="1.25" fill="url(#underlineGrad)"/>
    </g>
  </g>
</svg>
