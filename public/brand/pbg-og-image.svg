<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="ulGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="vertGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <!-- White Background -->
  <rect width="1200" height="630" fill="#FFFFFF"/>

  <!-- Left edge: 4px vertical gradient bar -->
  <rect x="0" y="0" width="4" height="630" fill="url(#vertGrad)"/>

  <!-- ===== Logo (top-left) ===== -->
  <!-- Icon Mark -->
  <g transform="translate(60, 50)">
    <rect x="0" y="0" width="52" height="52" rx="11" ry="11" fill="url(#grad)"/>
    <polygon points="18,10 24,29 18,42 12,29" fill="#FFFFFF"/>
    <circle cx="18" cy="40" r="1.8" fill="#FFFFFF"/>
    <line x1="28" y1="15" x2="42" y2="15" stroke="#FFFFFF" stroke-opacity="0.65" stroke-width="2" stroke-linecap="round"/>
    <line x1="28" y1="21" x2="40" y2="21" stroke="#FFFFFF" stroke-opacity="0.55" stroke-width="2" stroke-linecap="round"/>
    <line x1="28" y1="27" x2="38" y2="27" stroke="#FFFFFF" stroke-opacity="0.50" stroke-width="2" stroke-linecap="round"/>
    <line x1="28" y1="33" x2="36" y2="33" stroke="#FFFFFF" stroke-opacity="0.45" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Wordmark next to icon -->
  <text x="124" y="76" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="20" fill="#0F172A" letter-spacing="0.3">Profile Bio</text>
  <text x="124" y="96" font-family="Georgia, 'Times New Roman', serif" font-weight="400" font-size="15" fill="#64748B" letter-spacing="0.2">Generator</text>
  <rect x="124" y="101" width="42" height="2" rx="1" fill="url(#ulGrad)"/>

  <!-- ===== Large Headline ===== -->
  <text x="60" y="230" font-family="'Plus Jakarta Sans', 'Inter', sans-serif" font-weight="700" font-size="52" fill="#0F172A">Free Profile</text>
  <!-- "Bio Generator" in gradient text -->
  <text x="60" y="295" font-family="'Plus Jakarta Sans', 'Inter', sans-serif" font-weight="700" font-size="52" fill="url(#textGrad)">Bio Generator</text>

  <!-- Sub-headline -->
  <text x="60" y="350" font-family="'Inter', sans-serif" font-weight="400" font-size="20" fill="#64748B">Create bios for Instagram, TikTok, LinkedIn, YouTube &amp; more</text>
  <text x="60" y="378" font-family="'Inter', sans-serif" font-weight="400" font-size="20" fill="#64748B">— 100% Free.</text>

  <!-- Platform pills row -->
  <g transform="translate(60, 420)">
    <rect x="0" y="0" width="110" height="36" rx="8" ry="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="55" y="23" font-family="'Plus Jakarta Sans', sans-serif" font-weight="500" font-size="13" fill="#0F172A" text-anchor="middle">Instagram</text>

    <rect x="120" y="0" width="90" height="36" rx="8" ry="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="165" y="23" font-family="'Plus Jakarta Sans', sans-serif" font-weight="500" font-size="13" fill="#0F172A" text-anchor="middle">TikTok</text>

    <rect x="220" y="0" width="100" height="36" rx="8" ry="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="270" y="23" font-family="'Plus Jakarta Sans', sans-serif" font-weight="500" font-size="13" fill="#0F172A" text-anchor="middle">LinkedIn</text>

    <rect x="330" y="0" width="100" height="36" rx="8" ry="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="380" y="23" font-family="'Plus Jakarta Sans', sans-serif" font-weight="500" font-size="13" fill="#0F172A" text-anchor="middle">YouTube</text>

    <rect x="440" y="0" width="90" height="36" rx="8" ry="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="485" y="23" font-family="'Plus Jakarta Sans', sans-serif" font-weight="500" font-size="13" fill="#0F172A" text-anchor="middle">Twitter</text>

    <rect x="540" y="0" width="105" height="36" rx="8" ry="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="592" y="23" font-family="'Plus Jakarta Sans', sans-serif" font-weight="500" font-size="13" fill="#0F172A" text-anchor="middle">Pinterest</text>

    <rect x="655" y="0" width="95" height="36" rx="8" ry="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="702" y="23" font-family="'Plus Jakarta Sans', sans-serif" font-weight="500" font-size="13" fill="#0F172A" text-anchor="middle">Threads</text>
  </g>

  <!-- Bottom-right: URL -->
  <text x="1140" y="590" font-family="'Fira Code', 'Courier New', monospace" font-weight="400" font-size="15" fill="#94A3B8" text-anchor="end">profilebiogenerator.site</text>
</svg>
