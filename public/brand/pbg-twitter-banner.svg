<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="ulGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="#F8FAFC"/>

  <!-- ===== LEFT SIDE: Logo ===== -->
  <!-- Icon Mark (68×68) -->
  <g transform="translate(80, 160)">
    <rect x="0" y="0" width="68" height="68" rx="14" ry="14" fill="url(#grad)"/>
    <polygon points="24,14 32,38 24,56 16,38" fill="#FFFFFF"/>
    <circle cx="24" cy="53" r="2.5" fill="#FFFFFF"/>
    <line x1="38" y1="20" x2="56" y2="20" stroke="#FFFFFF" stroke-opacity="0.65" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="38" y1="28" x2="54" y2="28" stroke="#FFFFFF" stroke-opacity="0.55" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="38" y1="36" x2="52" y2="36" stroke="#FFFFFF" stroke-opacity="0.50" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="38" y1="44" x2="50" y2="44" stroke="#FFFFFF" stroke-opacity="0.45" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <text x="164" y="195" font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="28" fill="#0F172A" letter-spacing="0.3">Profile Bio</text>
  <text x="164" y="222" font-family="Georgia, 'Times New Roman', serif" font-weight="400" font-size="20" fill="#64748B" letter-spacing="0.2">Generator</text>
  <rect x="164" y="228" width="52" height="2.5" rx="1.25" fill="url(#ulGrad)"/>

  <!-- Tagline below logo -->
  <text x="80" y="290" font-family="'Plus Jakarta Sans', 'Inter', sans-serif" font-weight="500" font-size="18" fill="#64748B">Create the perfect bio for every social platform.</text>

  <!-- ===== RIGHT SIDE: Platform Pills ===== -->
  <g transform="translate(720, 200)">
    <!-- Instagram -->
    <rect x="0" y="0" width="110" height="36" rx="8" ry="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="55" y="23" font-family="'Plus Jakarta Sans', 'Inter', sans-serif" font-weight="500" font-size="13" fill="#0F172A" text-anchor="middle">Instagram</text>

    <!-- TikTok -->
    <rect x="120" y="0" width="90" height="36" rx="8" ry="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="165" y="23" font-family="'Plus Jakarta Sans', 'Inter', sans-serif" font-weight="500" font-size="13" fill="#0F172A" text-anchor="middle">TikTok</text>

    <!-- Twitter -->
    <rect x="220" y="0" width="90" height="36" rx="8" ry="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="265" y="23" font-family="'Plus Jakarta Sans', 'Inter', sans-serif" font-weight="500" font-size="13" fill="#0F172A" text-anchor="middle">Twitter</text>

    <!-- LinkedIn -->
    <rect x="320" y="0" width="100" height="36" rx="8" ry="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="370" y="23" font-family="'Plus Jakarta Sans', 'Inter', sans-serif" font-weight="500" font-size="13" fill="#0F172A" text-anchor="middle">LinkedIn</text>

    <!-- YouTube -->
    <rect x="430" y="0" width="100" height="36" rx="8" ry="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="480" y="23" font-family="'Plus Jakarta Sans', 'Inter', sans-serif" font-weight="500" font-size="13" fill="#0F172A" text-anchor="middle">YouTube</text>

    <!-- Pinterest -->
    <rect x="540" y="0" width="105" height="36" rx="8" ry="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="592" y="23" font-family="'Plus Jakarta Sans', 'Inter', sans-serif" font-weight="500" font-size="13" fill="#0F172A" text-anchor="middle">Pinterest</text>

    <!-- Threads -->
    <rect x="160" y="48" width="100" height="36" rx="8" ry="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <text x="210" y="71" font-family="'Plus Jakarta Sans', 'Inter', sans-serif" font-weight="500" font-size="13" fill="#0F172A" text-anchor="middle">Threads</text>
  </g>

  <!-- Top-right: URL -->
  <text x="1420" y="40" font-family="'Fira Code', 'Courier New', monospace" font-weight="400" font-size="13" fill="#94A3B8" text-anchor="end">profilebiogenerator.site</text>

  <!-- Bottom edge: full-width gradient line -->
  <rect x="0" y="496" width="1500" height="4" fill="url(#lineGrad)"/>
</svg>
